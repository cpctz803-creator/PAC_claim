<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビルマルチ・クレーム検索システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-xl p-6 border border-slate-200">
        <h1 class="text-xl md:text-2xl font-bold text-center text-blue-950 mb-6 border-b pb-4 border-blue-100">
            🏢 ビル用マルチエアコン クレーム・不具合検索
        </h1>

        <div class="mb-5">
            <label class="block text-sm font-bold text-slate-700 mb-2">【STEP 1】カテゴリ（種類）を選択してください</label>
            <select id="categorySelect" onchange="updateItems()" class="w-full p-3 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm md:text-base">
                <option value="">-- カテゴリを選択 --</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-slate-700 mb-2">【STEP 2】クレーム・現象を選択してください</label>
            <select id="itemSelect" onchange="showResult()" disabled class="w-full p-3 bg-slate-100 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm md:text-base disabled:opacity-50">
                <option value="">-- 先にカテゴリを選択してください --</option>
            </select>
        </div>

        <div id="resultCard" class="hidden border border-blue-200 rounded-lg bg-blue-50/50 p-5 animate-fadeIn">
            <h2 id="resTitle" class="text-base md:text-lg font-bold text-blue-900 mb-4 flex items-center">
                <span class="bg-blue-600 text-white rounded-full w-6 h-6 inline-flex items-center justify-center text-xs mr-2">!</span>
                現象：<span id="txtPhenomenon"></span>
            </h2>
            
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-white p-4 rounded-md border border-slate-200 shadow-sm">
                    <span class="text-xs font-bold text-red-600 block mb-1">🚨 主な原因（技術的要因）</span>
                    <p id="txtCause" class="text-sm md:text-base text-slate-700 font-medium whitespace-pre-wrap"></p>
                </div>
                
                <div class="bg-white p-4 rounded-md border border-slate-200 shadow-sm">
                    <span class="text-xs font-bold text-green-700 block mb-1">🛠️ 対処方法（現場対応・初期アクション）</span>
                    <p id="txtAction" class="text-sm md:text-base text-slate-700 whitespace-pre-wrap"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 20項目のマスターデータ
        const data = {
            "1. 温度・効きに関する不具合": [
                { id: 1, text: "冷えない・暖まらない（一部の部屋）", cause: "電子膨張弁（LEV）の固着、系統内の冷媒偏流", action: "該当室のLEV開度データを確認。手動強制開弁を試みるか、LEVコイルの抵抗値測定・本体交換を手配してください。" },
                { id: 2, text: "冷えない・暖まらない（系統全体）", cause: "冷媒漏洩、コンプレッサーの故障、冷媒過充填", action: "試運転データを取得し、高圧・低圧の圧力値を確認。漏洩検査（ガス検知・蛍光剤）またはコンプレッサーの絶縁・ロック確認を手配します。" },
                { id: 7, text: "暖房立ち上がりが遅い", cause: "オイル回収制御、デフロスト（除霜）運転の頻発", action: "仕様上の正常動作であるケースが多いため、顧客へ仕組みを説明。頻発する場合は外気温度や室外機熱交換器の着雪状況を確認します。" },
                { id: 11, text: "設定温度に達していないのに風が止まる", cause: "サーモオフ（吸込温度センサーの検知誤差、ショートサーキット）", action: "室内機の吸込温度と実際の居室温度を測定。風向板を調整して気流のショートサーキットを防ぐか、リモコンセンサーへの切替を検討します。" },
                { id: 15, text: "特定の部屋だけ風が届かない（温度ムラ）", cause: "風量設定ミス、吹出グリル・アネモの風向板の調整不良", action: "リモコンの設定風量を確認。吹出シャッターやアネモの羽根（コアンダ効果の確認）を調整。iPadのサーモカメラ等で気流を可視化すると説明しやすいです。" }
            ],
            "2. 水・油漏れに関する不具合": [
                { id: 3, text: "冷房中に天井から水が垂れてくる", cause: "ドレンパンの詰まり（スライム）、ドレンアップポンプの故障", action: "最優先対応。ドレンパン内の水を抜き、スライムを通管洗浄。ポンプの動作音とフロートスイッチの導通を確認してください。" },
                { id: 17, text: "室外機の周りから水が溢れている", cause: "冬季のデフロスト排水の処理不良、ドレンソケットの詰まり", action: "室外機底面のドレン穴・排水溝の詰まりを清掃。寒冷地の場合は排水管への凍結防止ヒーターの設置を検討・提案します。" },
                { id: 20, text: "リニューアル後、既存配管から油が漏れる", cause: "既設配管洗浄の不足、旧冷媒（R22）油と新冷媒（R410A/R32）の不適合", action: "油のサンプルを採取。変質・劣化が進んでいる場合は、系統内の再洗浄（リフレッシュ運転）または配管更新の計画を立てます。" }
            ],
            "3. 音・振動・臭いに関する不具合": [
                { id: 4, text: "特定の室内機から異音がする（カタカタ）", cause: "通風パネルの嵌合不良、ファンモーターのベアリング摩耗", action: "化粧パネルやフィルターの固定状態を固定。ファンを手で回して引っかかりやベアリングの異音を確認し、モーター交換を手配します。" },
                { id: 5, text: "冷媒配管から「シュー」と音がする", cause: "冷媒のフラッシュ現象（液管でのガス化）、LEVの作動音", action: "過冷却度が不足している可能性があるため、冷媒量の確認（不足時の追加充填）や配管長・高低差による圧損を再計算します。" },
                { id: 6, text: "室外機からの低周波騒音・振動", cause: "防振ゴムの経年劣化、設置架台の強度不足、圧縮機の異常振動", action: "架台ボルトの緩みを確認・増し締め。防振ゴム（ゴム厚・硬度）の交換、または防振架台への変更を提案します。" },
                { id: 9, text: "吹出風がカビ臭い・酸っぱい臭いがする", cause: "熱交換器（フィン）やドレンパン内部のカビ・雑菌繁殖", action: "薬品を用いた高圧洗浄（エアコンクリーニング）を施主に提案。運用面として、冷房停止直前の「送風乾燥運転」の徹底を推奨します。" },
                { id: 13, text: "冷房中に吹出口から霧（白い息）が出る", cause: "室内が高湿度（外気処理不足）、吹出風速と温度のアンバランス", action: "部屋の窓や扉が開放されていないか確認。外気処理空調の動作を確認し、室内機の風量を「急」にして様子を見ます。" }
            ],
            "4. 制御・運用・システムに関する不具合": [
                { id: 10, text: "液晶リモコンにエラーコードが出て止まる", cause: "通信エラー（U4など）、各種センサー（サーミスタ）の断線", action: "エラーコードをiPhoneで確認。室内外連絡線の電圧（渡り配線の断線・短絡）をテスターで測定、または該当センサーの抵抗値を測定します。" },
                { id: 12, text: "リモコンで操作しても反応しない", cause: "リモコン線の断線、ノイズによる通信障害、親機・子機設定ミス", action: "手元リモコン～室内機基板間の配線を確認。集中管理コントローラーがある場合は、アドレス設定（重複がないか）を再確認します。" },
                { id: 16, text: "冷房と暖房が混在して動かない", cause: "運転モードの混在（冷暖選択権の競合、集中管理のロック）", action: "同一系統内で冷房と暖房が同時に要求されていないか確認。親リモコン（運転切換権保有）でモードを統一するか、集中管理側でロックします。" },
                { id: 19, text: "スケジュール通りに運転・停止しない", cause: "集中管理コントローラーの時計ズレ、タイマー設定の重複", action: "集中コントローラーの現在時刻を修正（停電後のズレ確認）。スケジュール設定が重複していないか、個別リモコンのタイマーと競合していないか確認します。" },
                { id: 8, text: "室外機から白煙（湯気）が出ている", cause: "デフロスト運転時の熱交換器からの水蒸気", action: "異常現象（故障や火災）ではないことを施主・管理者に丁寧に説明し、安心させてあげてください。" }
            ],
            "5. 電気・エネルギーに関する不具合": [
                { id: 14, text: "ブレーカーが落ちる（漏電・過電流）", cause: "コンプレッサーの絶縁不良（地絡）、クランクケースヒーターの断線", action: "安全第一。主電源を切り、メガテスター（絶縁抵抗計）で各圧縮機・ファンモーター・ヒーターの対地絶縁抵抗を測定し、不良部品を特定します。" },
                { id: 18, text: "電気代が急に高くなった", cause: "フィルターの著しい目詰まり、冷媒漏れによる効率低下", action: "フィルターの清掃状況を確認。過去の運転電流値や冷媒圧力データと比較し、コンプレッサーの過負荷や熱交換効率の低下を調査。省エネチューニングを提案します。" }
            ]
        };

        // 初期化処理（カテゴリ選択の選択肢を生成）
        window.onload = function() {
            const catSelect = document.getElementById("categorySelect");
            for (let cat in data) {
                let opt = document.createElement("option");
                opt.value = cat;
                opt.innerHTML = cat;
                catSelect.appendChild(opt);
            }
        };

        // カテゴリが選ばれたら、クレーム・現象の選択肢を更新
        function updateItems() {
            const catSelect = document.getElementById("categorySelect");
            const itemSelect = document.getElementById("itemSelect");
            const resCard = document.getElementById("resultCard");
            
            const selectedCat = catSelect.value;
            itemSelect.innerHTML = '<option value="">-- クレーム・現象を選択 --</option>';
            resCard.classList.add("hidden");

            if (!selectedCat) {
                itemSelect.disabled = true;
                itemSelect.classList.replace("bg-white", "bg-slate-100");
                return;
            }

            // 選択されたカテゴリのアイテムを追加
            data[selectedCat].forEach(item => {
                let opt = document.createElement("option");
                opt.value = item.id;
                opt.innerHTML = `No.${item.id} : ${item.text}`;
                itemSelect.appendChild(opt);
            });

            itemSelect.disabled = false;
            itemSelect.classList.replace("bg-slate-100", "bg-white");
        }

        // クレーム・現象が選ばれたら、原因と対処方法を表示
        function showResult() {
            const catSelect = document.getElementById("categorySelect");
            const itemSelect = document.getElementById("itemSelect");
            const resCard = document.getElementById("resultCard");

            const selectedCat = catSelect.value;
            const selectedId = parseInt(itemSelect.value);

            if (!selectedId) {
                resCard.classList.add("hidden");
                return;
            }

            // 対象データを検索
            const matchedItem = data[selectedCat].find(item => item.id === selectedId);

            if (matchedItem) {
                document.getElementById("txtPhenomenon").innerText = matchedItem.text;
                document.getElementById("txtCause").innerText = matchedItem.cause;
                document.getElementById("txtAction").innerText = matchedItem.action;
                resCard.classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
